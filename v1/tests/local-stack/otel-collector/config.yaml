# OpenTelemetry Collector (contrib) — local-stack pipeline
# Receives OTLP (traces, metrics) from the hog gateway and forwards them to
# OpenObserve, which requires a Basic-auth header that KrakenD's own OTLP
# exporter cannot add — hence this thin collector in front.
#
# Logs are intentionally NOT shipped here (see tests/local-stack/README.md):
# hog emits structured JSON logs with trace_id on stdout; wiring those into
# OpenObserve is a follow-up.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # OpenObserve OTLP/HTTP ingest. The otlphttp exporter appends /v1/traces and
  # /v1/metrics to this endpoint, matching /api/{org}/v1/* on OpenObserve.
  otlphttp/openobserve:
    endpoint: http://openobserve:5080/api/default
    headers:
      Authorization: "Basic cm9vdEBleGFtcGxlLmNvbTpDb21wbGV4cGFzczEyMw=="
      stream-name: default
  # Mirror to the collector log at normal verbosity so `podman logs` shows
  # whether spans/metrics are flowing.
  debug:
    verbosity: normal

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/openobserve, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/openobserve, debug]

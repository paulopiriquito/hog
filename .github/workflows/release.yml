name: release
on:
  push:
    tags: ['v*.*.*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'version tag, e.g. v2.0.0'
        required: true
permissions:
  contents: read
  packages: write
env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: v
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: hog-builder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/hog-builder:latest
            ${{ env.REGISTRY }}/hog-builder:${{ steps.v.outputs.tag }}
      - name: hog-runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/hog-runtime:latest
            ${{ env.REGISTRY }}/hog-runtime:${{ steps.v.outputs.tag }}
      - name: hog-static
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.static
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: BASE=${{ env.REGISTRY }}/hog-runtime:${{ steps.v.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/hog-static:latest
            ${{ env.REGISTRY }}/hog-static:${{ steps.v.outputs.tag }}
      - name: hog-docs
        uses: docker/build-push-action@v6
        with:
          context: website
          file: website/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: BASE=${{ env.REGISTRY }}/hog-static:${{ steps.v.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/hog-docs:latest
            ${{ env.REGISTRY }}/hog-docs:${{ steps.v.outputs.tag }}

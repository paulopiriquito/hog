name: tests
on:
  pull_request:
  push:
    branches: [master, v2]
permissions:
  contents: read
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt vet
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - run: make test race
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # ubuntu-latest ships google-chrome, which chromedp uses; Docker is preinstalled.
      - run: make e2e

issuer: http://dex:5556

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

staticClients:
  - id: krakend
    redirectURIs:
      - 'http://localhost:3000/oauth/callback'
    name: 'KrakenD Gateway'
    secret: krakend-secret

enablePasswordDB: true

staticPasswords:
  - email: "test@example.com"
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: "test"
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
    groups:
      # Application-role groups (match the forward.headers mapping rules).
      - "cn=PT-LM-ROLE-KRONOS-USER,ou=applicationRole,o=corp"
      - "cn=GLOBAL-ROLE-GITHUB-CanJoin,ou=applicationRole,o=corp"
      # Noise group (no matching rule, must be filtered out).
      - "cn=PT-LM-SEDE,ou=people,o=corp"

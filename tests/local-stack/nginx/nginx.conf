events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    server {
        listen 80;
        server_name localhost;

        # Serve the test HTML page
        location / {
            root /usr/share/nginx/html;
            index test-auth-flow.html;
            try_files $uri $uri/ /test-auth-flow.html;
        }

        # Proxy all API requests to KrakenD
        location /oauth/ {
            proxy_pass http://hog:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Handle cookies properly
            proxy_cookie_path / /;
            proxy_cookie_domain hog $host;

            # Handle redirects
            proxy_redirect http://hog:8080/ /;
            proxy_redirect http://localhost:3000/ /;
        }

        # Proxy protected static content
        location /protected-static/ {
            proxy_pass http://hog:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_cookie_path / /;
            proxy_cookie_domain hog $host;

            proxy_redirect http://hog:8080/ /;
            proxy_redirect http://localhost:3000/ /;
        }

        # Proxy public static content
        location /static/ {
            proxy_pass http://hog:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_redirect http://hog:8080/ /;
            proxy_redirect http://localhost:3000/ /;
        }

        # Proxy other API endpoints for testing
        location ~ ^/(github|private|protected|show|supu)/ {
            proxy_pass http://hog:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_cookie_path / /;
            proxy_cookie_domain hog $host;

            proxy_redirect http://hog:8080/ /;
            proxy_redirect http://localhost:3000/ /;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}

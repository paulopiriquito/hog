name: hog-local-stack
services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/test-auth-flow.html:/usr/share/nginx/html/test-auth-flow.html:ro
    depends_on:
      hog:
        condition: service_started
    networks:
      - hog-network

  hog:
    build:
      context: ../../
      args:
        KRAKEND_VERSION: 2.12.0
        GOLANG_VERSION: 1.26
        ALPINE_VERSION: 3.21
        GOLANG_IMAGE: golang:1.26-alpine
      tags:
        - ghcr.io/paulopiriquito/hog:local
      platforms:
        - linux/arm64
        - linux/amd64
    restart: always
    ports:
      - "8090:8090"  # Prometheus metrics endpoint
    volumes:
      - ./hog/krakend.json:/etc/krakend/krakend.json
    environment:
      - SERVICE=hog
      - LOG_LEVEL=DEBUG
      - PORT=8080
      - USAGE_DISABLE=1
      # IDP Configuration
      - IDP_ISSUER=http://dex:5556
      - IDP_CLIENT_ID=krakend
      - IDP_CLIENT_SECRET=krakend-secret
      # Session Configuration
      - AUTH_COOKIE_KEY=abcdefghijklmnopqrstuvwxyz123456
      - AUTH_COOKIE_NAME=auth_session
      # Trace Configuration — "both" emits W3C trace_id (OpenObserve) AND
      # dd.trace_id/dd.span_id (Datadog log-trace correlation) in every log line.
      - TRACE_FORMAT=both
      - OTEL_SERVICE_NAME=hog-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    depends_on:
      dex:
        condition: service_started
    networks:
      - hog-network

  dex:
    image: dexidp/dex:latest
    restart: always
    ports:
      - "5556:5556"
    volumes:
      - ./dex/dex-config.yaml:/etc/dex/config.yaml
      - dex-data:/var/dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    networks:
      - hog-network

  # =============================================================================
  # OTEL-native Observability (OpenTelemetry Collector -> OpenObserve)
  # =============================================================================

  # OpenTelemetry Collector (contrib) - receives OTLP from hog, forwards to
  # OpenObserve with the Basic-auth header OpenObserve's ingest requires.
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.154.0
    restart: always
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    depends_on:
      openobserve:
        condition: service_started
    networks:
      - hog-network

  # OpenObserve - single-binary OTEL-native backend + UI for traces & metrics.
  # UI/login at http://localhost:5080 (root@example.com / Complexpass123).
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.14.7
    restart: always
    ports:
      - "5080:5080"   # Web UI, query API, and OTLP/HTTP ingest
    environment:
      - ZO_ROOT_USER_EMAIL=root@example.com
      - ZO_ROOT_USER_PASSWORD=Complexpass123
      - ZO_DATA_DIR=/data
      # Local testing: flush WAL to searchable storage in ~seconds instead of
      # the 10-minute default, so traces/metrics show up promptly in the UI.
      - ZO_FILE_PUSH_INTERVAL=5
      - ZO_MAX_FILE_RETENTION_TIME=5
    volumes:
      - openobserve-data:/data
    networks:
      - hog-network

networks:
  hog-network:
    driver: bridge

volumes:
  dex-data:
  openobserve-data:

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /e2e-static/ {
        rewrite ^/e2e-static/(.*)$ /$1 break;
        try_files $uri $uri/ =404;
    }

    location /static/ {
        rewrite ^/static/(.*)$ /$1 break;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
